# CI : lint + tests sur chaque push / pull request.
name: CI (lint + tests)

on:
  push:
    branches: [main]
    paths-ignore: ["docs/**", "*.md"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Ruff (lint)
        run: ruff check .

      - name: Dashboard JavaScript syntax
        run: |
          node --check public/activity-board.js
          node --check public/family-view.js
          node --check public/family-content-gate.js
          node --check public/family-reasons.js
          node --check public/freshness-gate.js
          node --check public/port-knowledge.js
          node --check public/reasons-debug.js
          node --check public/verdict-hero.js
          node --check public/js/reasons-i18n.js
          node --check public/js/verdict.js

      - name: Dashboard JavaScript tests
        run: node --test tests/js/*.test.mjs

      - name: Pytest
        run: python -m pytest -q --junitxml=pytest-results.xml

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest-results.xml
          if-no-files-found: ignore
          retention-days: 7
