# CI : lint + tests sur chaque push / pull request.
name: CI (lint + tests)

on:
  push:
    branches: [main]
    paths-ignore: ["docs/**", "*.md"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Ruff (lint)
        run: ruff check .

      - name: Pytest
        run: python -m pytest -q
