# Collecte horaire + déploiement GitHub Pages.
#
# v2 : remplace pages.yml. Changements clés :
# - cron horaire direct (le gate "heure locale" v1 sautait des collectes dès
#   que le cron GitHub avait du retard, et gaspillait 20 runs/jour) ;
# - toute la logique Python vit dans le package fable/ (testée), plus
#   d'inline scripts de 600 lignes dans le YAML ;
# - job keepalive hebdomadaire : commit vide pour empêcher GitHub de
#   désactiver le cron après 60 jours sans activité.
name: Collect & Deploy (fable-collector)

on:
  workflow_dispatch:
    inputs:
      tz:
        description: "IANA timezone (ex: Africa/Tunis)"
        default: "Africa/Tunis"
      window_hours:
        description: "Horizon de prévision en heures"
        default: "72"
      start_iso:
        description: "Optionnel: début ISO (YYYY-MM-DDTHH:MM)"
        required: false
      only_sites:
        description: "Optionnel: restreindre à certains sites (CSV de slugs)"
        required: false
      reader_home:
        description: "Optionnel: JSON du port d'attache (défaut: home de sites.yaml)"
        required: false

  schedule:
    - cron: "7,27,47 * * * *"
    - cron: "23 3 * * 0"

  push:
    branches: [main]
    paths:
      - ".github/workflows/collect.yml"
      - "requirements.txt"
      - "fable/**"
      - "collect.py"
      - "reader.py"
      - "sites.yaml"
      - "rules.yaml"
      - "activity_profiles.yaml"
      - "fishing_profiles.yaml"
      - "knowledge/**"
      - "public/**"

# Une collecte ou un déploiement déjà lancé doit finir. Les déclenchements
# suivants attendent au lieu d'annuler la production en cours, ce qui évite
# une boucle de starvation lorsque les API météo ou GitHub Pages sont lentes.
concurrency:
  group: "fable-pages-refresh"
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  keepalive:
    if: github.event_name == 'schedule' && github.event.schedule == '23 3 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Empty keepalive commit
        run: |
          git config user.name "fable-bot"
          git config user.email "actions@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive — prevent scheduled workflow auto-disable [skip ci]"
          git push

  schedule_guard:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
      reason: ${{ steps.guard.outputs.reason }}
    steps:
      - uses: actions/checkout@v6
      - name: Decide whether scheduled refresh is needed
        id: guard
        env:
          FABLE_BASE_URL: "https://rbpower-hub.github.io/fable-collector"
          FABLE_MIN_INTERVAL_MIN: "50"
          FABLE_EVENT_NAME: ${{ github.event_name }}
          FABLE_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          python - <<'PY'
          import os
          from fable.healthcheck import should_collect_live

          event_name = os.environ.get("FABLE_EVENT_NAME", "")
          event_schedule = os.environ.get("FABLE_EVENT_SCHEDULE", "")
          if event_name != "schedule":
              should_run, reason = True, "non-scheduled trigger"
          elif event_schedule == "23 3 * * 0":
              should_run, reason = False, "weekly keepalive slot"
          else:
              should_run, reason = should_collect_live(
                  os.environ["FABLE_BASE_URL"],
                  min_interval_min=int(os.environ["FABLE_MIN_INTERVAL_MIN"]),
              )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"should_run={'true' if should_run else 'false'}\n")
              fh.write(f"reason={reason}\n")
          print(reason)
          PY

  build:
    needs: schedule_guard
    if: needs.schedule_guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preflight (validate sites.yaml + rules.yaml, export normalized)
        run: python -m fable.preflight

      - name: Collect (Open-Meteo -> public/*.json + index.json)
        env:
          FABLE_TZ: ${{ inputs.tz || 'Africa/Tunis' }}
          FABLE_WINDOW_HOURS: ${{ inputs.window_hours || '72' }}
          FABLE_START_ISO: ${{ inputs.start_iso || '' }}
          FABLE_ONLY_SITES: ${{ inputs.only_sites || '' }}
          FABLE_HTTP_RETRIES: "3"
          FABLE_HTTP_TIMEOUT_S: "12"
          FABLE_PARALLEL_MODELS: "icon_seamless,gfs_seamless,ecmwf_ifs04"
          FABLE_PARALLEL_TIMEOUT_S: "12"
          FABLE_ASTRAL_FALLBACK: "1"
          FABLE_RULES_PATH: rules.yaml
          LOG_LEVEL: INFO
        run: |
          python collect.py || (echo "Collector failed once, retrying in 10s..." && sleep 10 && python collect.py)

      - name: Detect Family GO windows
        env:
          FABLE_RULES_PATH: rules.yaml
        run: |
          if [ -n "${{ inputs.reader_home }}" ]; then
            python reader.py --from-dir public --out public --home "${{ inputs.reader_home }}"
          else
            python reader.py --from-dir public --out public
          fi

      - name: Generate activity and fishing recommendations
        run: python -m fable.recommendations

      - name: Keep offshore crossings navigation-only
        run: python -m fable.offshore_recommendations

      - name: Generate port route and shelter knowledge
        run: python -m fable.port_knowledge

      - name: Enable dashboard extension components
        shell: python
        run: |
          import json
          from pathlib import Path

          page = Path("public/index.html")
          html = page.read_text(encoding="utf-8")
          activity_tag = '<script src="./activity-board.js"></script>'
          family_tag = '<script src="./family-view.js"></script>'
          port_tag = '<script src="./port-knowledge.js"></script>'
          tags = [activity_tag, family_tag]

          knowledge_path = Path("public/port-knowledge.json")
          if knowledge_path.exists():
              data = json.loads(knowledge_path.read_text(encoding="utf-8"))
              if any(port.get("display_eligible") is True for port in data.get("ports", [])):
                  tags.append(port_tag)

          if port_tag not in tags:
              html = html.replace(f"  {port_tag}\n", "").replace(port_tag, "")
          for tag in tags:
              if tag not in html:
                  html = html.replace("</body>", f"  {tag}\n</body>")
          page.write_text(html, encoding="utf-8")

      - name: Publish (catalog, status, windows.md, final checks)
        run: python -m fable.publish

      - name: Job summary
        run: |
          echo "## FABLE — fenêtres Family GO" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat public/windows.md >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "## Activités recommandées" >> "$GITHUB_STEP_SUMMARY"
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          data = json.load(open("public/recommendations.json", encoding="utf-8"))
          for item in data.get("recommendations", []):
              activities = ", ".join(a.get("label_fr", a.get("activity_id", "")) for a in item.get("activities", []))
              print(f"- {item.get('dest_name')}: {activities}")
          for item in data.get("navigation_only", []):
              print(f"- {item.get('origin_name')} → {item.get('destination_name')}: navigation offshore {item.get('direction')}")
          PY
          echo "## Port Knowledge validé" >> "$GITHUB_STEP_SUMMARY"
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          data = json.load(open("public/port-knowledge.json", encoding="utf-8"))
          visible = [port for port in data.get("ports", []) if port.get("display_eligible") is True]
          if not visible:
              print("- Aucune route ni aucun abri validé à afficher.")
          for port in visible:
              route = port.get("route", {})
              print(f"- {port.get('name')}: {route.get('trip_mode')} · {route.get('distance_nm')} NM")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
