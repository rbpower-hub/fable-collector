# Healthcheck EXTERNE : vérifie le déploiement Pages en production.
#
# v3 : confirme les erreurs transitoires avant d'alerter, neutralise le cache
# Pages et clôt automatiquement l'incident lorsque la production redevient saine.
name: Healthcheck (fable-collector)

on:
  schedule:
    - cron: "41 */6 * * *"   # toutes les 6 h, minute décalée
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check live Pages deployment with confirmation retries
        id: check
        run: |
          set +e
          code=1
          for attempt in 1 2 3; do
            echo "Healthcheck attempt ${attempt}/3"
            python -m fable.healthcheck "https://rbpower-hub.github.io/fable-collector" > /tmp/health.log 2>&1
            code=$?
            cat /tmp/health.log
            if [ "$code" -eq 0 ]; then
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Transient failure possible; retrying in 45 seconds..."
              sleep 45
            fi
          done
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: Open/update issue on persistent failure
        if: steps.check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/health.log', 'utf8');
            const title = '🔴 Healthcheck: production Pages stale or broken';
            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'healthcheck'
            });
            const body = `Healthcheck persistant du ${new Date().toISOString()} après 3 tentatives :\n\n\`\`\`\n${log}\n\`\`\`\n` +
              `➡️ Vérifier le workflow **Collect & Deploy** : collecte, API météo, file GitHub Actions ou déploiement Pages.`;
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues[0].number, body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['healthcheck']
              });
            }

      - name: Close recovered healthcheck incidents
        if: steps.check.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'healthcheck'
            });
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ Production rétablie et confirmée par le healthcheck du ${new Date().toISOString()}. Incident clôturé automatiquement.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
            }

      - name: Fail job if persistently unhealthy
        if: steps.check.outputs.exit_code != '0'
        run: exit 1
