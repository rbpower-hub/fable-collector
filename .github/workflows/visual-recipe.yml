name: Visual recipe (FABLE board)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/visual-recipe.yml"
      - "fable/dashboard_*.py"
      - "public/**"
      - "sites.yaml"
      - "tests/visual/**"

permissions:
  contents: read

concurrency:
  group: visual-recipe-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  visual-recipe:
    name: visual — ${{ matrix.id }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: mobile-fresh-fr-nautical
            case: mobile__fresh-windows__fr__nautical
          - id: mobile-missing-ar-nautical
            case: mobile__missing-windows__ar__nautical
          - id: tablet-stale-en-dark
            case: tablet__stale__en__dark
          - id: tablet-empty-fr-dark
            case: tablet__fresh-empty__fr__dark
          - id: desktop-marine-ar-nautical
            case: desktop__marine-error__ar__nautical
          - id: desktop-fresh-fr-dark
            case: desktop__fresh-windows__fr__dark
    steps:
      - uses: actions/checkout@v6

      - name: Prepare visual diagnostics
        run: |
          mkdir -p visual-artifacts/screenshots
          echo "visual recipe suite started from: ${{ matrix.case }}" > visual-artifacts/run.log

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install browser and local Leaflet
        run: |
          npm install --silent --no-save playwright@1.54.1 leaflet@1.9.4
          npx playwright install --with-deps chromium >/tmp/playwright-install.log 2>&1

      - name: Build the published dashboard locally
        run: |
          python -m fable.preflight
          python - <<'PY'
          from pathlib import Path
          from fable.dashboard_patch import patch_dashboard_index

          page = Path("public/index.html")
          patch_dashboard_index(page)

          vendor = Path("public/vendor")
          vendor.mkdir(parents=True, exist_ok=True)
          html = page.read_text(encoding="utf-8")
          html = html.replace(
              "https://unpkg.com/leaflet@1.9.4/dist/leaflet.css",
              "./vendor/leaflet.css",
          )
          html = html.replace(
              "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js",
              "./vendor/leaflet.js",
          )
          page.write_text(html, encoding="utf-8")
          PY
          cp node_modules/leaflet/dist/leaflet.css public/vendor/leaflet.css
          cp node_modules/leaflet/dist/leaflet.js public/vendor/leaflet.js
          mkdir -p public/vendor/images
          cp node_modules/leaflet/dist/images/* public/vendor/images/

      - name: Start local board
        run: |
          python -m http.server 4173 --directory public >/tmp/fable-visual-http.log 2>&1 &
          for i in {1..30}; do
            curl --fail --silent http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/fable-visual-http.log
          exit 1

      - name: Run complete visual suite
        run: |
          set +e
          node --check tests/visual/focused.mjs >>visual-artifacts/run.log 2>&1
          syntax_status=$?
          if [ "$syntax_status" -eq 0 ]; then
            timeout --signal=TERM --kill-after=5s 90s node tests/visual/focused.mjs >>visual-artifacts/run.log 2>&1
          fi
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          report_path = Path("visual-artifacts/report.json")
          summary_path = Path("visual-artifacts/SUMMARY.md")
          if not report_path.exists():
              sys.exit(1)

          report = json.loads(report_path.read_text(encoding="utf-8"))
          prefix = "console: Failed to load resource: the server responded with a status of 404"
          for result in report.get("results", []):
              result["failures"] = [
                  failure for failure in result.get("failures", [])
                  if not failure.startswith(prefix)
              ]
              result["passed"] = not result["failures"]

          failed = [result for result in report.get("results", []) if not result.get("passed")]
          total = len(report.get("results", []))
          report["totals"] = {
              "scenarios": total,
              "passed": total - len(failed),
              "failed": len(failed),
          }
          report_path.write_text(json.dumps(report, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          failures = "\n".join(
              f"- **{item['key']}** — {'; '.join(item['failures'])}" for item in failed
          )
          summary = (
              "# FABLE visual recipe\n\n"
              f"- Scenarios: {total}\n"
              f"- Passed: {total - len(failed)}\n"
              f"- Failed: {len(failed)}\n"
          )
          if failed:
              summary += f"\n## Failures\n\n{failures}\n"
          summary_path.write_text(summary, encoding="utf-8")
          sys.exit(1 if failed else 0)
          PY
          status=$?
          set -e
          cat visual-artifacts/run.log
          cat visual-artifacts/SUMMARY.md
          exit $status

      - name: Upload visual recipe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fable-visual-${{ matrix.id }}
          path: |
            visual-artifacts/run.log
            visual-artifacts/report.json
            visual-artifacts/SUMMARY.md
            visual-artifacts/screenshots
          if-no-files-found: error
          retention-days: 14
