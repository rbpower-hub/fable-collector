name: Visual recipe (FABLE board)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/visual-recipe.yml"
      - "fable/dashboard_*.py"
      - "public/**"
      - "sites.yaml"
      - "tests/visual/**"

permissions:
  contents: read

jobs:
  visual-recipe:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install browser and local Leaflet
        run: |
          npm install --no-save playwright@1.54.1 leaflet@1.9.4
          npx playwright install --with-deps chromium

      - name: Build the published dashboard locally
        run: |
          python -m fable.preflight
          python - <<'PY'
          from pathlib import Path
          from fable.dashboard_patch import patch_dashboard_index

          page = Path("public/index.html")
          patch_dashboard_index(page)

          vendor = Path("public/vendor")
          vendor.mkdir(parents=True, exist_ok=True)
          html = page.read_text(encoding="utf-8")
          html = html.replace(
              "https://unpkg.com/leaflet@1.9.4/dist/leaflet.css",
              "./vendor/leaflet.css",
          )
          html = html.replace(
              "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js",
              "./vendor/leaflet.js",
          )
          page.write_text(html, encoding="utf-8")
          PY
          cp node_modules/leaflet/dist/leaflet.css public/vendor/leaflet.css
          cp node_modules/leaflet/dist/leaflet.js public/vendor/leaflet.js
          mkdir -p public/vendor/images
          cp node_modules/leaflet/dist/images/* public/vendor/images/

      - name: Start local board
        run: |
          python -m http.server 4173 --directory public >/tmp/fable-visual-http.log 2>&1 &
          for i in {1..30}; do
            curl --fail --silent http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/fable-visual-http.log
          exit 1

      - name: Run visual acceptance matrix
        run: |
          mkdir -p visual-artifacts
          node --check tests/visual/run.mjs >visual-artifacts/run.log 2>&1
          set +e
          node tests/visual/run.mjs >>visual-artifacts/run.log 2>&1
          status=$?
          set -e
          cat visual-artifacts/run.log
          exit $status

      - name: Upload visual recipe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fable-visual-recipe
          path: visual-artifacts
          if-no-files-found: error
          retention-days: 14
