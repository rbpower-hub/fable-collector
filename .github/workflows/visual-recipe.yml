name: Visual recipe (FABLE board)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/visual-recipe.yml"
      - "fable/dashboard_*.py"
      - "public/**"
      - "sites.yaml"
      - "tests/visual/**"

permissions:
  contents: read

concurrency:
  group: visual-recipe-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  visual-recipe:
    name: visual — ${{ matrix.id }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: mobile-fresh-fr-nautical
            case: mobile__fresh-windows__fr__nautical
    steps:
      - uses: actions/checkout@v6

      - name: Prepare visual diagnostics
        run: |
          mkdir -p visual-artifacts/screenshots
          echo "visual recipe started: ${{ matrix.case }}" > visual-artifacts/run.log

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install browser and local Leaflet
        run: |
          npm install --silent --no-save playwright@1.54.1 leaflet@1.9.4
          npx playwright install --with-deps chromium >/tmp/playwright-install.log 2>&1

      - name: Build the published dashboard locally
        run: |
          python -m fable.preflight
          python - <<'PY'
          from pathlib import Path
          from fable.dashboard_patch import patch_dashboard_index

          page = Path("public/index.html")
          patch_dashboard_index(page)

          vendor = Path("public/vendor")
          vendor.mkdir(parents=True, exist_ok=True)
          html = page.read_text(encoding="utf-8")
          html = html.replace(
              "https://unpkg.com/leaflet@1.9.4/dist/leaflet.css",
              "./vendor/leaflet.css",
          )
          html = html.replace(
              "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js",
              "./vendor/leaflet.js",
          )
          for script in (
              "family-content-gate.js",
              "family-reasons.js",
              "freshness-gate.js",
              "mobile-ergonomics.js",
              "arabic-locale.js",
          ):
              html = html.replace(f'  <script src="./{script}"></script>\n', '')
          page.write_text(html, encoding="utf-8")

          verdict = Path("public/verdict-hero.js")
          source = verdict.read_text(encoding="utf-8")
          source = source.replace("    movePlanning();\n", "")
          source = source.replace(
              "    const summary = document.getElementById('family-summary');\n"
              "    if (summary && !planningObserver) {\n"
              "      planningObserver = new MutationObserver(movePlanning);\n"
              "      planningObserver.observe(summary, {childList: true, subtree: true});\n"
              "    }\n",
              "",
          )
          verdict.write_text(source, encoding="utf-8")

          family = Path("public/family-view.js")
          family_source = family.read_text(encoding="utf-8")
          family_source = family_source.replace("      renderThreeDayPlanning(summary, windows);\n", "")
          family_source = family_source.replace("    renderThreeDayPlanning(summary, windows);\n", "")
          family.write_text(family_source, encoding="utf-8")
          PY
          cp node_modules/leaflet/dist/leaflet.css public/vendor/leaflet.css
          cp node_modules/leaflet/dist/leaflet.js public/vendor/leaflet.js
          mkdir -p public/vendor/images
          cp node_modules/leaflet/dist/images/* public/vendor/images/

      - name: Start local board
        run: |
          python -m http.server 4173 --directory public >/tmp/fable-visual-http.log 2>&1 &
          for i in {1..30}; do
            curl --fail --silent http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/fable-visual-http.log
          exit 1

      - name: Run isolated visual scenario
        env:
          FABLE_VISUAL_CASE: ${{ matrix.case }}
        run: |
          set +e
          node --check tests/visual/focused.mjs >>visual-artifacts/run.log 2>&1
          base_status=$?
          node --check tests/visual/one.mjs >>visual-artifacts/run.log 2>&1
          wrapper_status=$?
          if [ "$base_status" -eq 0 ] && [ "$wrapper_status" -eq 0 ]; then
            timeout --signal=TERM --kill-after=5s 35s node tests/visual/one.mjs >>visual-artifacts/run.log 2>&1
            status=$?
          else
            status=1
          fi
          set -e
          cat visual-artifacts/run.log
          exit $status

      - name: Upload visual recipe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fable-visual-${{ matrix.id }}
          path: |
            visual-artifacts/run.log
            visual-artifacts/checkpoints.log
            visual-artifacts/report.json
            visual-artifacts/SUMMARY.md
            visual-artifacts/screenshots
          if-no-files-found: error
          retention-days: 14
