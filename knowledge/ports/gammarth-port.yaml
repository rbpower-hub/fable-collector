      baits: [ver, crevette, "leurre souple 7–10 cm"]
      depths_m: [6, 18]
      preferred_periods: [sunrise, sunset]
    autumn:
      species: [sar, pageot, chinchard, bonitot]
      techniques: [bottom-fishing, light-jigging, coastal-trolling]
      rigs: ["bottom drift 20–60 g", "petit jig 20–40 g"]
      baits: [ver, couteau, calamar]
      depths_m: [8, 20]
      preferred_periods: [sunrise, sunset]
    winter:
      species: [merlan, pageot, poulpe]
