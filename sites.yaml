# sites.yaml — schéma v2 (multi-port)
# ------------------------------------------------------------------
# home     : slug du port d'attache (départ/retour des sorties)
# exclude  : spots ignorés par le collecteur (politique FABLE)
# defaults : valeurs appliquées aux sites qui ne les précisent pas
# sites[]  : name (libre, accents OK), lat/lon décimaux (N/E positifs),
#            map_lat/map_lon optionnels pour la position visuelle exacte sur la carte
#            transit_speed_kts optionnel {min,max} pour estimer la durée de traversée
#            route_origin optionnel pour une route en plusieurs legs
#            route_points optionnel [{name,lat,lon}] pour tracer un itinéraire mer
#            route_kind définit la logique de trajet (standard ou offshore_one_way_beta)
#            onshore_sectors : secteurs de vent d'affalement [de, à] en degrés
#            (wrap-around supporté : [330, 360] + [0, 70]),
#            shelter_bonus_radius_km : rayon du bonus mouillage abrité.
#
# Pour déployer sur un autre port : changer home + la liste des sites.
# L'ancien format v1 (liste simple) reste accepté (rétro-compatibilité).
# ------------------------------------------------------------------
version: 2
tz: Africa/Tunis
home: gammarth-port

# Ras Fartass est la destination canonique du cap Bon pour FABLE.
# Korbous est un lieu distinct : ne jamais l'utiliser comme alias ou point météo de remplacement.
exclude: [korbous]

defaults:
  shelter_bonus_radius_km: 0.0
  transit_speed_kts: {min: 16, max: 24}
  onshore_sectors: [[20, 160]]

sites:
  - name: "Gammarth (port)"
    lat: 36.92030
    lon: 10.28460
    map_lat: 36.92100
    map_lon: 10.31000
    onshore_sectors: [[30, 150]]

  - name: "Sidi Bou Saïd"
    lat: 36.87030
    lon: 10.34190
    map_lat: 36.86500
    map_lon: 10.35100
    onshore_sectors: [[30, 150]]

  - name: "Ghar el Melh"
    lat: 37.17670
    lon: 10.17000
    map_lat: 37.17700
    map_lon: 10.28000
    onshore_sectors: [[10, 130]]

  - name: "Ras Fartass"
    lat: 36.87740
    lon: 10.60320
    map_lat: 36.87700
    map_lon: 10.61300
    route_note: "Destination côtière de référence depuis Gammarth et couramment fréquentée depuis Sidi Bou Saïd. Ras Fartass est distinct de Korbous ; toutes les prévisions et recommandations doivent utiliser le spot ras-fartass."
    onshore_sectors: [[330, 360], [0, 70]]

  - name: "El Haouaria"
    lat: 36.96430
    lon: 11.00900
    map_lat: 37.06300
    map_lon: 11.00800
    onshore_sectors: [[330, 360], [0, 70]]

  - name: "Kelibia"
    lat: 36.84730
    lon: 11.09340
    map_lat: 36.84730
    map_lon: 11.09340
    transit_speed_kts: {min: 18, max: 24}
    route_kind: long_trip_one_way
    # Corridor maritime : le précédent segment unique El Haouaria→Kélibia
    # coupait visuellement le cap Bon et sous-estimait la distance navigable.
    # Ces points suivent le passage au large du cap puis la côte orientale.
    route_points:
      - name: "El Haouaria — au large"
        lat: 37.06300
        lon: 11.00800
      - name: "Cap Bon nord — au large"
        lat: 37.09600
        lon: 11.03500
      - name: "Cap Bon nord-est — au large"
        lat: 37.09000
        lon: 11.06000
      - name: "Cap Bon est — au large"
        lat: 37.03000
        lon: 11.10000
      - name: "Dar Allouche — au large"
        lat: 36.95000
        lon: 11.12000
      - name: "Approche Kélibia par le large"
        lat: 36.88000
        lon: 11.12000
    route_note: "Trajet long évalué séparément en aller Gammarth→Kélibia et en retour Kélibia→Gammarth sur l’horizon de 72 h. Corridor cartographique indicatif via le nord et l’est du cap Bon, à confirmer sur cartes nautiques officielles avant navigation."
    onshore_sectors: [[330, 360], [0, 70]]

  - name: "Pantelleria"
    lat: 36.83330
    lon: 11.95000
    map_lat: 36.83330
    map_lon: 11.95000
    country: Italy
    beta: true
    windows_enabled: true
    route_origin: kelibia
    route_kind: offshore_one_way_beta
    route_note: "Traversée offshore évaluée séparément en aller Kélibia→Pantelleria et en retour Pantelleria→Kélibia. Aucun aller-retour à Gammarth le même jour n’est exigé ; le pré-positionnement Gammarth↔Kélibia se planifie séparément."
    transit_speed_kts: {min: 18, max: 24}
